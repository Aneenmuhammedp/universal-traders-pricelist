<!DOCTYPE html>
<html>
<head>
<title>Quotation History</title>
<style>
body{font-family:Arial;background:#f4faff;padding:20px;}
.card{
  background:white; padding:15px; margin:10px 0;
  border-left:5px solid #0ea5e9; border-radius:8px;
}
</style>
</head>
<body>

<h2>📚 Quotation History</h2>
<div id="history"></div>

<script>
let data = JSON.parse(localStorage.getItem("quotes") || "[]");
let container = document.getElementById("history");

data.forEach(q => {
  let div = document.createElement("div");
  div.className = "card";
  div.textContent = q;
  container.appendChild(div);
});
</script>

</body>
</html>
