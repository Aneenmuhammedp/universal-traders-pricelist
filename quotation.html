<!DOCTYPE html>
<html>
<head>
<title>Quotation Notes</title>
<style>
body{font-family:Arial;background:#f4faff;text-align:center;}
textarea{
  width:90%; height:300px; margin-top:20px;
  border:2px solid #0ea5e9; border-radius:10px; padding:10px;
}
button{
  margin:10px; padding:10px 20px;
  background:#0ea5e9; color:white; border:none; border-radius:8px;
}
</style>
</head>
<body>

<h2>📝 Quotation Notepad</h2>
<textarea id="note" placeholder="Enter quotation details..."></textarea><br>
<button onclick="saveNote()">Save</button>

<script>
function saveNote(){
  let notes = localStorage.getItem("quotes") || "[]";
  notes = JSON.parse(notes);
  notes.push(document.getElementById("note").value);
  localStorage.setItem("quotes", JSON.stringify(notes));
  alert("Saved to history!");
}
</script>

</body>
</html>
