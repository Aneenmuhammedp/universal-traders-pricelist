<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";

import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

import { addDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";


const firebaseConfig = {

  apiKey: "AIzaSyDFD7MhXjxBxctyjer9jp7pLh6E6ek4y4A",

  authDomain: "universal-traders-pricelist.firebaseapp.com",

  projectId: "universal-traders-pricelist",

  storageBucket: "universal-traders-pricelist.firebasestorage.app",

  messagingSenderId: "150604008965",

  appId: "1:150604008965:web:efe915ee6cbce92530566c"

};



const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



async function loadItems(){

  const querySnapshot = await getDocs(collection(db, "items"));

  const tableBody = document.getElementById("#table1 tbody");

  

  if(querySnapshot.empty){

    console.log("No Firebase data, showing local dataset");
    renderLocalData();
    return;

  }



  tableBody.innerHTML = "";



  querySnapshot.forEach((doc) => {

    const item = doc.data();

    tableBody.innerHTML += `

      <tr>

        <td>${item.slno}</td>

        <td>${item.name}</td>

        <td>${item.weight}</td>

        <td>${item.colour || "-"}</td>

        <td>${item.price}</td>

      </tr>

    `;

  });

}



loadItems();

async function uploadHardware() {
const hardwareRef = collection(db, "hardware");

for (let i = 0; i < hardwareData.length; i++) {
const item = hardwareData[i];

await addDoc(hardwareRef, {
slno: i + 1,
name: item[0],
price: item[1]
});
}

alert("Hardware uploaded successfully!");
}

function searchHardwareItem() {

  const input = document.getElementById("hardwareSearch").value.toLowerCase();

  const rows = document.querySelectorAll("#tbody3 tr");



  let firstMatch = null;



  rows.forEach(row => {

    row.classList.remove("highlight-row");



    const itemName = row.cells[1].innerText.toLowerCase();



    if (itemName.includes(input) && input !== "") {

      row.classList.add("highlight-row");



      if (!firstMatch) {

        firstMatch = row; // store only first match

      }

    }

  });



  // Scroll only once

  if (firstMatch) {

    firstMatch.scrollIntoView({

      behavior: "smooth",

      block: "center"

    });

  }

}

<script>

function showSheet(sheetId) {

  // Hide all sheets

  const sheets = document.querySelectorAll('.sheet');

  sheets.forEach(sheet => sheet.style.display = 'none');



  // Remove active class from all buttons

  const buttons = document.querySelectorAll('.tabs button');

  buttons.forEach(btn => btn.classList.remove('active'));



  // Show selected sheet

  document.getElementById(sheetId).style.display = 'block';



  // Add active class to clicked button

  event.target.classList.add('active');

}

</script>
